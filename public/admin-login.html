<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Host Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-panel">
      <p class="eyebrow">Host Access</p>
      <h1>Minor in AI Activities</h1>
      <p class="note">Enter the host PIN to open activity controls and leaderboards.</p>
      <form id="loginForm" class="login-form">
        <input id="pin" type="password" autocomplete="current-password" placeholder="Host PIN" autofocus>
        <button class="btn green" type="submit">Unlock Host</button>
      </form>
      <p class="status" id="loginStatus"></p>
    </section>
  </main>
  <script src="/admin-login.js"></script>
</body>
</html>
