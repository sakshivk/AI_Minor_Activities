<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vi-Activities Leaderboards</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="leaderboard-page">
    <nav class="host-nav">
      <a href="/" class="back-link">Back to activities</a>
      <button class="btn secondary" id="logoutHost">Lock Host Controls</button>
    </nav>
    <section class="ceremony-hero compact">
      <p class="eyebrow">Final Results</p>
      <h1>Live Leaderboards</h1>
      <p>Top completed submissions rank by score and time.</p>
    </section>
    <section class="grid-two">
      <article class="panel">
        <h2>Find the Differences</h2>
        <ol class="leaderboard" id="diffBoard"></ol>
      </article>
      <article class="panel">
        <h2>Magic Matrix</h2>
        <ol class="leaderboard" id="matrixBoard"></ol>
      </article>
      <article class="panel">
        <h2>Fake or Real</h2>
        <ol class="leaderboard" id="fakeRealBoard"></ol>
      </article>
    </section>
  </main>
  <script src="/host-auth.js"></script>
  <script src="/leaderboards.js"></script>
</body>
</html>
